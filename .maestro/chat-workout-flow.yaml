appId: com.x031pjs.jealthapp
name: "채팅 운동 기록 플로우"
---
- launchApp

- waitForAnimationToEnd:
    timeout: 15000

# 로그인 안 되어 있으면 로그인
- runFlow: login_flow.yaml

# 기록 탭으로 이동
- tapOn: "기록"
- waitForAnimationToEnd

# FAB 버튼 클릭 (+ 운동 추가 선택 화면 진입)
- tapOn:
    id: "fab-button"
- waitForAnimationToEnd

# 채팅 모드 선택
- assertVisible: "💬 채팅 모드"
- tapOn: "💬 채팅 모드"
- waitForAnimationToEnd

# 채팅 화면 진입 확인
- assertVisible: "오늘의 운동을 자연어로"

# 자연어 입력
- tapOn:
    id: "chat-input"
- inputText: "벤치프레스 4세트 10개 20kg, 10개 25kg, 8개 30kg, 6개 35kg"
- tapOn: "전송"

# AI 응답 대기 후 저장 확정
- extendedWaitUntil:
    visible: "이대로 저장"
    timeout: 15000
- tapOn: "이대로 저장"

# 저장 완료 확인
- assertVisible: "저장됨"
